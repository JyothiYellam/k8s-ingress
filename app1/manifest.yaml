apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  labels:
    project: roboshop
    tier: frontend
    component: app1
spec:
  replicas: 2
  selector:
    matchLabels:
      project: roboshop
      tier: frontend
      component: app1
  template:
    metadata:
      labels:
        project: roboshop
        tier: frontend
        component: app1
    spec:
      containers:
        - name: app1
          image: jyothi023/app1:1.0.0 
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector: 
    project: roboshop
    tier: frontend
    component: app1
  ports: 
   - protocol: TCP
     port: 27017
     targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector: 
    project: roboshop
    tier: frontend
    component: app1
  ports: 
   - protocol: TCP
     port: 80 #service port
     targetPort: 80 #container port
---
apiVersion: v1
kind: Service
metadata:
  name: app1
spec:
  selector: 
    project: roboshop
    tier: frontend
    component: app1
  ports: 
   - protocol: TCP
     port: 80 #service port
     targetPort: 80 #container port